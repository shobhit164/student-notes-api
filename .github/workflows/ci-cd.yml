name: CI/CD Pipeline

on:
  pull_request:
    branches: [main]
  push:
    branches: [main]

jobs:
  test:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Run test suite
        run: pytest

  deploy:
    needs: test
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    runs-on: ubuntu-latest
    env:
      RAW_AZURE_VM_HOST: ${{ secrets.AZURE_VM_HOST }}
      RAW_AZURE_VM_USER: ${{ secrets.AZURE_VM_USER }}
      RAW_AZURE_VM_APP_PATH: ${{ secrets.AZURE_VM_APP_PATH }}

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Normalize Azure deployment values
        run: |
          {
            printf 'AZURE_VM_HOST=%s\n' "$(printf '%s' "$RAW_AZURE_VM_HOST" | tr -d '\r\n')"
            printf 'AZURE_VM_USER=%s\n' "$(printf '%s' "$RAW_AZURE_VM_USER" | tr -d '\r\n')"
            printf 'AZURE_VM_APP_PATH=%s\n' "$(printf '%s' "$RAW_AZURE_VM_APP_PATH" | tr -d '\r\n')"
          } >> "$GITHUB_ENV"

      - name: Start SSH agent and add key
        uses: webfactory/ssh-agent@v0.9.0
        with:
          ssh-private-key: ${{ secrets.AZURE_VM_SSH_KEY }}

      - name: Add Azure VM host to known_hosts
        run: |
          mkdir -p ~/.ssh
          ssh-keyscan -H "$AZURE_VM_HOST" >> ~/.ssh/known_hosts

      - name: Sync project files to Azure VM
        run: |
          rsync -avz --delete \
            --exclude ".git" \
            --exclude ".github" \
            ./ "$AZURE_VM_USER@$AZURE_VM_HOST:$AZURE_VM_APP_PATH"

      - name: Restart application on Azure VM
        run: |
          ssh "$AZURE_VM_USER@$AZURE_VM_HOST" \
            "cd '$AZURE_VM_APP_PATH' && chmod +x deploy/azure-vm/deploy.sh && ./deploy/azure-vm/deploy.sh"
